# total 15 tests
version: 2

models:
  # (Dimensions)
  - name: dim_customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null

  - name: dim_employees
    columns:
      - name: employee_id
        data_tests:
          - unique
          - not_null
      - name: store_id
        data_tests:
          - not_null

  - name: dim_stores
    columns:
      - name: store_id
        data_tests:
          - unique
          - not_null

  - name: dim_products
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null

  #  (Facts)
  - name: fact_order_items
    columns:
      - name: order_item_id
        data_tests:
          - unique
          - not_null
      - name: order_id
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id
      - name: line_amount
        data_tests:
            - dbt_utils.accepted_range:
                min_value: 0